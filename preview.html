<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRBL Preview</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --teal: #14b8a6;
    --amber: #f59e0b;
    --red: #ef4444;
    --green: #22c55e;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: "Segoe UI", Arial, sans-serif; }
  body { display: flex; flex-direction: column; }

  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-right: auto;
  }

  .btn, .select {
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12px;
  }

  .btn {
    cursor: pointer;
  }

  .btn:hover, .select:hover { border-color: var(--teal); }

  .stats {
    display: flex;
    gap: 10px;
    color: var(--muted);
    font-size: 12px;
  }

  .shell {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
  }

  .viewport {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: radial-gradient(circle at top, rgba(20,184,166,0.08), transparent 36%), var(--bg);
  }

  .canvas-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
  }

  .benchmark-info-panel {
    display: none;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(26, 29, 39, 0.82);
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-line;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .status-box {
    display: none;
    position: absolute;
    left: 12px;
    top: 12px;
    padding: 10px 12px;
    background: rgba(26, 29, 39, 0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    max-width: 360px;
    white-space: pre-line;
  }

  .sidebar {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .side-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .command-list {
    list-style: none;
    margin: 0;
    padding: 0;
    overflow-y: auto;
    flex: 1;
    font-family: Consolas, 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.35;
  }

  .queue-panel {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--surface);
  }

  .queue-panel-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .queue-panel-row .select {
    flex: 1;
    min-width: 0;
  }

  .queue-panel .btn {
    width: 100%;
  }

  .queue-check {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
  }

  .queue-status {
    color: var(--muted);
    font-size: 11px;
    min-height: 16px;
  }

  .command-item {
    border-bottom: 1px solid rgba(46, 51, 71, 0.35);
    padding: 6px 10px;
    cursor: pointer;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .command-item:hover { background: rgba(34, 38, 58, 0.6); }
  .command-item.active { background: rgba(20, 184, 166, 0.14); border-left: 2px solid var(--teal); color: var(--text); padding-left: 8px; }
    .command-item.selected { background: rgba(59, 130, 246, 0.14); border-left: 2px solid var(--blue); color: var(--text); padding-left: 8px; }
    .command-item.selected.active { background: rgba(59, 130, 246, 0.22); border-left: 2px solid var(--blue); }
    .ai-context-bar { border-top: 1px solid var(--border); padding: 8px 10px; display: flex; align-items: center; gap: 8px; background: var(--surface); flex-shrink: 0; }
    .ai-context-bar .btn { flex: 1; font-size: 11px; padding: 5px 8px; }
    .ai-context-count { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .command-line { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .command-text { color: var(--text); font-family: Consolas, monospace; font-size: 12px; word-break: break-word; }
  .command-meta { color: var(--muted); font-size: 11px; margin-top: 4px; }

  .empty {
    margin: auto;
    max-width: 440px;
    text-align: center;
    color: var(--muted);
    line-height: 1.7;
    padding: 24px;
  }

  .empty strong { color: var(--text); }

  .benchmark-tape-panel {
    display: none;
    flex-direction: column;
    min-height: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
    max-height: 196px;
  }

  .benchmark-tape-panel.active {
    display: flex;
  }

  .tape-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    gap: 8px;
  }

  .tape-title {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }

  .tape-copy-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 5px;
    padding: 6px 10px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }

  .tape-copy-btn:hover {
    border-color: var(--teal);
    background: rgba(20, 184, 166, 0.08);
  }

  .tape-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    font-family: Consolas, 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
    background: rgba(15, 17, 23, 0.5);
  }

  .tape-content code {
    color: var(--text);
    background: rgba(0, 0, 0, 0.3);
    padding: 1px 3px;
    border-radius: 2px;
  }

  @media (max-width: 960px) {
    .shell { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) 280px; }
    .sidebar { border-left: 0; border-top: 1px solid var(--border); }
  }

  body.benchmark-mode #rewind-btn,
  body.benchmark-mode #step-back-btn,
  body.benchmark-mode #speed-select,
  body.benchmark-mode #play-btn,
  body.benchmark-mode #step-forward-btn,
  body.benchmark-mode #end-btn,
  body.benchmark-mode #fit-btn,
  body.benchmark-mode .queue-panel { display: none; }

  body.benchmark-mode .shell { grid-template-columns: minmax(0, 1fr) 320px; }
  body.benchmark-mode .benchmark-info-panel { display: block; }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="title">GRBL Preview</div>
    <button class="btn" id="rewind-btn" type="button">Rewind</button>
    <button class="btn" id="step-back-btn" type="button">Step Back</button>
    <select class="select" id="speed-select" aria-label="Playback speed">
      <option value="0.5">0.5x</option>
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
      <option value="8" selected>8x</option>
    </select>
    <button class="btn" id="play-btn" type="button">Play</button>
    <button class="btn" id="step-forward-btn" type="button">Step Forward</button>
    <button class="btn" id="end-btn" type="button">End</button>
    <button class="btn" id="fit-btn" type="button">Fit</button>
    <select class="select" id="view-select" aria-label="Preview mode">
      <option value="perspective">Perspective</option>
      <option value="top">Top</option>
      <option value="benchmark">Benchmark</option>
    </select>
    <div class="stats" id="stats"></div>
  </div>

  <div class="shell">
    <div class="viewport">
      <div class="benchmark-info-panel" id="benchmark-info-panel"></div>
      <div class="canvas-wrap">
        <canvas id="preview-canvas"></canvas>
        <div class="status-box" id="status-box">Waiting for preview data from the main window.</div>
        <div class="empty" id="empty-state"><strong>No preview loaded.</strong><br>Return to the main app and click Preview on a GCOM script.</div>
      </div>
      <div class="benchmark-tape-panel" id="benchmark-tape-panel">
        <div class="tape-header">
          <span class="tape-title">Benchmark Data (AI Format)</span>
          <button class="tape-copy-btn" id="tape-copy-btn" type="button">Copy JSON</button>
        </div>
        <div class="tape-content" id="tape-content"></div>
      </div>
    </div>
    <aside class="sidebar">
      <div class="side-header">
        <span>Command Tape</span>
        <span id="command-progress">0 / 0</span>
      </div>
      <ul class="command-list" id="command-list"></ul>
        <div class="ai-context-bar" id="ai-context-bar">
          <span class="ai-context-count" id="ai-context-count">0 selected</span>
          <button class="btn" id="send-to-ai-btn" type="button" disabled>Send to AI</button>
        </div>
      <div class="queue-panel">
        <div class="queue-panel-row">
          <select class="select" id="queue-mode-select" aria-label="Queue execution mode">
            <option value="sync-ack">Synchronous (ack-gated)</option>
            <option value="fast-buffer" selected>Fast buffered</option>
          </select>
        </div>
        <label class="queue-check">
          <input type="checkbox" id="queue-include-nonmotion" checked>
          Include non-motion commands
        </label>
        <button class="btn" id="queue-from-preview-btn" type="button">Queue as GCode</button>
        <div class="queue-status" id="queue-status">Queue target ready.</div>
      </div>
    </aside>
  </div>

<script>
const canvas = document.getElementById('preview-canvas');
const ctx = canvas.getContext('2d');
const titleEl = document.getElementById('title');
const statsEl = document.getElementById('stats');
const statusBox = document.getElementById('status-box');
const benchmarkInfoPanel = document.getElementById('benchmark-info-panel');
const emptyState = document.getElementById('empty-state');
const commandList = document.getElementById('command-list');
const commandProgress = document.getElementById('command-progress');
const sendToAiBtn = document.getElementById('send-to-ai-btn');
const aiContextCount = document.getElementById('ai-context-count');
const benchmarkTapePanel = document.getElementById('benchmark-tape-panel');
const tapeContent = document.getElementById('tape-content');
const tapeCopyBtn = document.getElementById('tape-copy-btn');
const rewindBtn = document.getElementById('rewind-btn');
const playBtn = document.getElementById('play-btn');
const stepBackBtn = document.getElementById('step-back-btn');
const stepForwardBtn = document.getElementById('step-forward-btn');
const endBtn = document.getElementById('end-btn');
const fitBtn = document.getElementById('fit-btn');
const viewSelect = document.getElementById('view-select');
const speedSelect = document.getElementById('speed-select');
const queueModeSelect = document.getElementById('queue-mode-select');
const queueIncludeNonMotion = document.getElementById('queue-include-nonmotion');
const queueFromPreviewBtn = document.getElementById('queue-from-preview-btn');
const queueStatus = document.getElementById('queue-status');

let timeline = null;
let commandItems = [];
let lastActiveCommandId = -1;
let selectedCommandIds = new Set();
let lastClickedCommandId = null;
const PREVIEW_MIN_ZOOM = 0.2;
const PREVIEW_MAX_ZOOM = 6;
let canvasCssWidth = 1;
let canvasCssHeight = 1;
let lastStatusText = '';
let lastBenchmarkInfoText = '';
const staticLayerCanvas = document.createElement('canvas');
const staticLayerCtx = staticLayerCanvas.getContext('2d');
let staticLayerKey = '';
let playback = {
  playing: false,
  commandCursor: 0,
  speed: 8,
  viewMode: 'top',
  baseCommandMs: 260,
  lastFrameAt: 0,
  accumulatorMs: 0,
  zoom: 1
};

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvasCssWidth = Math.max(1, Math.round(rect.width));
  canvasCssHeight = Math.max(1, Math.round(rect.height));
  const ratio = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.round(canvasCssWidth * ratio));
  canvas.height = Math.max(1, Math.round(canvasCssHeight * ratio));
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  staticLayerCanvas.width = canvasCssWidth;
  staticLayerCanvas.height = canvasCssHeight;
  staticLayerKey = '';
  render();
}

function setStatusText(nextText) {
  const text = String(nextText || '');
  if (text === lastStatusText) return;
  statusBox.textContent = text;
  lastStatusText = text;
}

function setBenchmarkInfoText(nextText) {
  const text = String(nextText || '');
  if (text === lastBenchmarkInfoText) return;
  benchmarkInfoPanel.textContent = text;
  lastBenchmarkInfoText = text;
}

function resetPlayback({ atEnd = true } = {}) {
  playback.playing = false;
  if (timeline && timeline.commandCount) {
    playback.commandCursor = atEnd ? timeline.commandCount - 1 : 0;
  } else {
    playback.commandCursor = 0;
  }
  playback.accumulatorMs = 0;
  playback.lastFrameAt = 0;
  playback.zoom = 1;
  syncPlaybackUi();
}

function jumpToEnd() {
  if (!timeline || !timeline.commandCount) return;
  playback.playing = false;
  setCommandCursor(timeline.commandCount - 1);
}

function syncPlaybackUi() {
  playBtn.textContent = playback.playing ? 'Pause' : 'Play';
  viewSelect.value = playback.viewMode;
  speedSelect.value = String(playback.speed);
  const count = timeline ? timeline.commandCount : 0;
  const displayIndex = count ? Math.min(playback.commandCursor + 1, count) : 0;
  commandProgress.textContent = `${displayIndex} / ${count}`;
}

function clampCommandCursor(value) {
  if (!timeline || !timeline.commandCount) return 0;
  return Math.max(0, Math.min(timeline.commandCount - 1, value));
}

function setCommandCursor(nextCommandId) {
  const previousCursor = playback.commandCursor;
  playback.commandCursor = clampCommandCursor(nextCommandId);
  syncPlaybackUi();
  updateCommandListActive(previousCursor, playback.commandCursor, true);
  render();
}

function stepCommands(delta) {
  if (!timeline || !timeline.commandCount) return;
  setCommandCursor(playback.commandCursor + delta);
}

function fitPreview() {
  playback.zoom = 1;
  render();
}

function applyWheelZoom(event) {
  if (playback.viewMode === 'benchmark') return;
  if (!timeline) return;
  event.preventDefault();
  const direction = event.deltaY > 0 ? -1 : 1;
  const factor = direction > 0 ? 1.1 : 1 / 1.1;
  const nextZoom = Math.max(PREVIEW_MIN_ZOOM, Math.min(PREVIEW_MAX_ZOOM, playback.zoom * factor));
  if (nextZoom === playback.zoom) return;
  playback.zoom = nextZoom;
  render();
}

function applyViewModeUi() {
  document.body.classList.toggle('benchmark-mode', playback.viewMode === 'benchmark');
}

function getBenchmarkSummary() {
  return Array.isArray(timeline?.benchmark?.summary) ? timeline.benchmark.summary : [];
}

function getBenchmarkSamples() {
  return Array.isArray(timeline?.benchmark?.samples) ? timeline.benchmark.samples : [];
}

function getBenchmarkSeries() {
  return Array.isArray(timeline?.benchmark?.series) ? timeline.benchmark.series : [];
}

function getBenchmarkActiveMarkers() {
  return Array.isArray(timeline?.benchmark?.activeMarkers) ? timeline.benchmark.activeMarkers : [];
}

function formatBenchmarkDataForAI() {
  if (!timeline || !timeline.benchmark) return null;
  const { benchmark } = timeline;
  const summary = getBenchmarkSummary();
  const samples = getBenchmarkSamples();
  const series = getBenchmarkSeries();
  const activeMarkers = getBenchmarkActiveMarkers();
  return {
    metadata: {
      ...(benchmark.meta || {}),
      title: benchmark.meta?.title || benchmark.title || 'BASIC Benchmark',
      description: benchmark.meta?.description || 'Generic BENCH stream capture for AI-driven visualization',
      format: 'JSON object with metadata, series, active markers, and raw records',
      startedAtIso: benchmark.startedAtIso,
      updatedAtIso: benchmark.updatedAtIso,
      sampleCount: samples.length,
      summaryCount: summary.length,
      seriesCount: series.length,
      activeMarkerCount: activeMarkers.length,
      xField: benchmark.meta?.xField || 'sampleIndex',
      yField: benchmark.meta?.yField || 'elapsedMs',
      seriesField: benchmark.meta?.seriesField || ''
    },
    summary,
    series,
    activeMarkers,
    records: Array.isArray(benchmark.records) ? benchmark.records : samples,
    samples
  };
}

let _lastTapeSampleCount = -1;

function renderBenchmarkDataTape() {
  const data = formatBenchmarkDataForAI();
  if (!data) {
    benchmarkTapePanel.classList.remove('active');
    _lastTapeSampleCount = -1;
    return;
  }
  benchmarkTapePanel.classList.add('active');
  // Skip expensive JSON.stringify + scroll when sample count hasn't changed
  if (data.samples.length === _lastTapeSampleCount) return;
  _lastTapeSampleCount = data.samples.length;
  tapeContent.textContent = JSON.stringify(data, null, 2);
  tapeContent.scrollTop = tapeContent.scrollHeight;
}

function copyBenchmarkDataToClipboard() {
  const data = formatBenchmarkDataForAI();
  if (!data) return;
  const jsonStr = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(jsonStr).then(() => {
    const originalText = tapeCopyBtn.textContent;
    tapeCopyBtn.textContent = 'Copied!';
    setTimeout(() => { tapeCopyBtn.textContent = originalText; }, 2000);
  }).catch(err => {
    console.error('Failed to copy to clipboard:', err);
  });
}

function renderBenchmarkChart(width, height) {
  const samples = getBenchmarkSamples();
  const series = getBenchmarkSeries();
  const activeMarkers = getBenchmarkActiveMarkers();
  const latestSample = timeline?.benchmark?.latestSample || null;
  const activeFields = activeMarkers[0]?.fields || null;
  const activeText = activeFields
    ? Object.entries(activeFields).map(([k, v]) => `${k}=${v}`).join(' ')
    : '';
  const meta = timeline?.benchmark?.meta || {};
  const xLabel = String(meta.xLabel || meta.xField || 'X');
  const yLabel = String(meta.yLabel || meta.yField || 'Y');
  const margin = { top: 36, right: 28, bottom: 68, left: 68 };
  const plotWidth = Math.max(120, width - margin.left - margin.right);
  const plotHeight = Math.max(120, height - margin.top - margin.bottom);

  ctx.save();
  ctx.fillStyle = 'rgba(15, 17, 23, 0.94)';
  ctx.fillRect(0, 0, width, height);

  ctx.strokeStyle = 'rgba(148, 163, 184, 0.20)';
  ctx.strokeRect(margin.left, margin.top, plotWidth, plotHeight);

  ctx.fillStyle = '#94a3b8';
  ctx.font = '12px Segoe UI, Arial, sans-serif';
  ctx.fillText(String(meta.title || timeline.title || 'Generic Benchmark'), margin.left, 20);

  const allPoints = [];
  series.forEach(item => {
    (item.points || []).forEach(point => allPoints.push(point));
  });

  if (!allPoints.length) {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px Segoe UI, Arial, sans-serif';
    ctx.fillText('Waiting for benchmark samples from a live BASIC run.', margin.left, margin.top + 28);
    ctx.restore();
    const benchmarkInfoText = [
      `${timeline.title || 'GRBL Preview'}`,
      'View: Benchmark',
      `Samples: ${samples.length}`,
      activeText ? `Active: ${activeText}` : 'Awaiting first completed BENCH marker pair'
    ].join('\n');
    setStatusText(benchmarkInfoText);
    setBenchmarkInfoText(benchmarkInfoText);
    return;
  }

  const xMin = Math.min(...allPoints.map(point => Number(point.x)));
  const xMax = Math.max(...allPoints.map(point => Number(point.x)));
  const yMin = Math.min(...allPoints.map(point => Number(point.y)));
  const yMax = Math.max(...allPoints.map(point => Number(point.y)));
  const xSpan = Math.max(1e-9, xMax - xMin);
  const ySpan = Math.max(1e-9, yMax - yMin);

  const pointX = x => margin.left + ((Number(x) - xMin) / xSpan) * plotWidth;
  const pointY = y => margin.top + plotHeight - ((Number(y) - yMin) / ySpan) * plotHeight;

  ctx.strokeStyle = 'rgba(148, 163, 184, 0.12)';
  ctx.lineWidth = 1;
  for (let tick = 0; tick <= 4; tick += 1) {
    const y = margin.top + (plotHeight * tick) / 4;
    ctx.beginPath();
    ctx.moveTo(margin.left, y);
    ctx.lineTo(margin.left + plotWidth, y);
    ctx.stroke();

    const yLabelValue = (yMax - ((ySpan * tick) / 4)).toFixed(2);
    ctx.fillStyle = '#94a3b8';
    ctx.fillText(yLabelValue, 12, y + 4);
  }

  const palette = ['#f59e0b', '#60a5fa', '#22c55e', '#ef4444', '#a78bfa', '#14b8a6'];
  series.forEach((item, seriesIndex) => {
    const color = palette[seriesIndex % palette.length];
    const points = Array.isArray(item.points) ? item.points : [];
    if (!points.length) return;

    ctx.strokeStyle = color;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    points.forEach((point, index) => {
      const x = pointX(point.x);
      const y = pointY(point.y);
      if (index === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    ctx.fillStyle = color;
    points.forEach(point => {
      const x = pointX(point.x);
      const y = pointY(point.y);
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
    });
  });

  ctx.save();
  ctx.translate(18, margin.top + plotHeight / 2 + 40);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#94a3b8';
  ctx.fillText(yLabel, 0, 0);
  ctx.restore();

  ctx.fillStyle = '#94a3b8';
  ctx.fillText(xLabel, margin.left + plotWidth / 2 - 18, height - 20);
  ctx.restore();

  const benchmarkInfoText = [
    `${timeline.title || 'GRBL Preview'}`,
    'View: Benchmark',
    `Samples: ${samples.length}`,
    `Series: ${series.length}`,
    latestSample
      ? `Latest: ${Number(latestSample.elapsedMs || 0).toFixed(1)} ms`
      : 'Latest: none',
    activeText ? `Active: ${activeText}` : 'Active: (idle)'
  ].join('\n');
  setStatusText(benchmarkInfoText);
  setBenchmarkInfoText(benchmarkInfoText);
}

function getVisibleSegmentEnd() {
  if (!timeline || !timeline.commandCount) return -1;
  for (let commandId = playback.commandCursor; commandId >= 0; commandId -= 1) {
    const segmentIndex = timeline.commandToLastSegment[commandId];
    if (typeof segmentIndex === 'number' && segmentIndex >= 0) return segmentIndex;
  }
  return -1;
}

function projectTopInto(point, bounds, scale, offsetX, offsetY, out) {
  out.x = offsetX + ((point.x - bounds.min.x) * scale);
  out.y = offsetY - ((point.y - bounds.min.y) * scale);
  return out;
}

function projectPerspectiveInto(point, center, scale, offsetX, offsetY, out) {
  const dx = point.x - center.x;
  const dy = point.y - center.y;
  const dz = point.z - center.z;
  const yaw = -Math.PI / 4;
  const pitch = Math.PI / 3.4;
  const x1 = (Math.cos(yaw) * dx) - (Math.sin(yaw) * dy);
  const y1 = (Math.sin(yaw) * dx) + (Math.cos(yaw) * dy);
  // Screen-space Y increases downward, so invert Z here to keep +Z visually upward.
  const z1 = -dz;
  const y2 = (Math.cos(pitch) * y1) - (Math.sin(pitch) * z1);
  const z2 = (Math.sin(pitch) * y1) + (Math.cos(pitch) * z1);
  const depth = 650 + z2;
  const perspectiveScale = (650 / Math.max(120, depth)) * scale;
  out.x = offsetX + (x1 * perspectiveScale);
  out.y = offsetY - (y2 * perspectiveScale);
  return out;
}

function computeSceneScale(bounds, width, height) {
  const spanX = Math.max(1, bounds.span.x);
  const spanY = Math.max(1, bounds.span.y);
  const spanZ = Math.max(1, bounds.span.z);
  const size = Math.max(spanX, spanY, spanZ);
  return ((Math.min(width, height) * 0.72) / size) * playback.zoom;
}

function renderGrid(drawCtx, bounds, width, height, offsetX, offsetY, scale) {
  const stepBase = Math.max(bounds.span.x, bounds.span.y, 50);
  const step = Math.max(1, Math.pow(10, Math.floor(Math.log10(stepBase)) - 1));
  const from = { x: 0, y: 0 };
  const to = { x: 0, y: 0 };
  drawCtx.save();
  drawCtx.strokeStyle = 'rgba(148, 163, 184, 0.10)';
  drawCtx.lineWidth = 1;
  for (let x = Math.floor(bounds.min.x / step) * step; x <= bounds.max.x + step; x += step) {
    projectTopInto({ x, y: bounds.min.y, z: 0 }, bounds, scale, offsetX, offsetY, from);
    projectTopInto({ x, y: bounds.max.y, z: 0 }, bounds, scale, offsetX, offsetY, to);
    drawCtx.beginPath();
    drawCtx.moveTo(from.x, from.y);
    drawCtx.lineTo(to.x, to.y);
    drawCtx.stroke();
  }
  for (let y = Math.floor(bounds.min.y / step) * step; y <= bounds.max.y + step; y += step) {
    projectTopInto({ x: bounds.min.x, y, z: 0 }, bounds, scale, offsetX, offsetY, from);
    projectTopInto({ x: bounds.max.x, y, z: 0 }, bounds, scale, offsetX, offsetY, to);
    drawCtx.beginPath();
    drawCtx.moveTo(from.x, from.y);
    drawCtx.lineTo(to.x, to.y);
    drawCtx.stroke();
  }
  drawCtx.restore();
}

function renderPerspectiveGrid(drawCtx, bounds, center, width, height, offsetX, offsetY, scale) {
  const stepBase = Math.max(bounds.span.x, bounds.span.y, 50);
  const step = Math.max(1, Math.pow(10, Math.floor(Math.log10(stepBase)) - 1));
  const from = { x: 0, y: 0 };
  const to = { x: 0, y: 0 };
  drawCtx.save();
  drawCtx.strokeStyle = 'rgba(148, 163, 184, 0.10)';
  drawCtx.lineWidth = 1;

  for (let x = Math.floor(bounds.min.x / step) * step; x <= bounds.max.x + step; x += step) {
    projectPerspectiveInto({ x, y: bounds.min.y, z: 0 }, center, scale, offsetX, offsetY, from);
    projectPerspectiveInto({ x, y: bounds.max.y, z: 0 }, center, scale, offsetX, offsetY, to);
    drawCtx.beginPath();
    drawCtx.moveTo(from.x, from.y);
    drawCtx.lineTo(to.x, to.y);
    drawCtx.stroke();
  }
  for (let y = Math.floor(bounds.min.y / step) * step; y <= bounds.max.y + step; y += step) {
    projectPerspectiveInto({ x: bounds.min.x, y, z: 0 }, center, scale, offsetX, offsetY, from);
    projectPerspectiveInto({ x: bounds.max.x, y, z: 0 }, center, scale, offsetX, offsetY, to);
    drawCtx.beginPath();
    drawCtx.moveTo(from.x, from.y);
    drawCtx.lineTo(to.x, to.y);
    drawCtx.stroke();
  }

  drawCtx.restore();
}

function renderAxes(drawCtx, bounds, width, height, offsetX, offsetY, scale, center) {
  const p0 = { x: 0, y: 0 };
  const p1 = { x: 0, y: 0 };
  const p2 = { x: 0, y: 0 };
  const p3 = { x: 0, y: 0 };
  const origin = playback.viewMode === 'top'
    ? projectTopInto({ x: 0, y: 0, z: 0 }, bounds, scale, offsetX, offsetY, p0)
    : projectPerspectiveInto({ x: 0, y: 0, z: 0 }, center, scale, offsetX, offsetY, p0);
  const xAxis = playback.viewMode === 'top'
    ? projectTopInto({ x: 25, y: 0, z: 0 }, bounds, scale, offsetX, offsetY, p1)
    : projectPerspectiveInto({ x: 25, y: 0, z: 0 }, center, scale, offsetX, offsetY, p1);
  const yAxis = playback.viewMode === 'top'
    ? projectTopInto({ x: 0, y: 25, z: 0 }, bounds, scale, offsetX, offsetY, p2)
    : projectPerspectiveInto({ x: 0, y: 25, z: 0 }, center, scale, offsetX, offsetY, p2);
  const zAxis = playback.viewMode === 'top'
    ? projectTopInto({ x: 0, y: 0, z: 25 }, bounds, scale, offsetX, offsetY, p3)
    : projectPerspectiveInto({ x: 0, y: 0, z: 25 }, center, scale, offsetX, offsetY, p3);

  drawCtx.save();
  drawCtx.lineWidth = 2;
  [[xAxis, '#ef4444'], [yAxis, '#22c55e'], [zAxis, '#60a5fa']].forEach(([endpoint, color]) => {
    drawCtx.strokeStyle = color;
    drawCtx.beginPath();
    drawCtx.moveTo(origin.x, origin.y);
    drawCtx.lineTo(endpoint.x, endpoint.y);
    drawCtx.stroke();
  });
  drawCtx.restore();
}

function renderStaticLayer(bounds, width, height, offsetX, offsetY, scale, center) {
  const key = [
    playback.viewMode,
    width,
    height,
    playback.zoom.toFixed(3),
    bounds.min.x.toFixed(3), bounds.min.y.toFixed(3), bounds.min.z.toFixed(3),
    bounds.max.x.toFixed(3), bounds.max.y.toFixed(3), bounds.max.z.toFixed(3)
  ].join('|');
  if (key !== staticLayerKey) {
    staticLayerCtx.clearRect(0, 0, width, height);
    if (playback.viewMode === 'top') {
      renderGrid(staticLayerCtx, bounds, width, height, offsetX - ((bounds.span.x * scale) / 2), offsetY + ((bounds.span.y * scale) / 2), scale);
    } else {
      renderPerspectiveGrid(staticLayerCtx, bounds, center, width, height, offsetX, offsetY, scale);
    }
    renderAxes(staticLayerCtx, bounds, width, height, offsetX, offsetY, scale, center);
    staticLayerKey = key;
  }
  ctx.drawImage(staticLayerCanvas, 0, 0, width, height);
}

function render() {
  const width = canvasCssWidth;
  const height = canvasCssHeight;
  ctx.clearRect(0, 0, width, height);

  applyViewModeUi();

  if (!timeline) return;

  emptyState.style.display = 'none';
  const isBenchmark = playback.viewMode === 'benchmark';
  if (isBenchmark) {
    renderBenchmarkChart(width, height);
    renderBenchmarkDataTape();
    return;
  }
  setBenchmarkInfoText('');
  benchmarkTapePanel.classList.remove('active');
  const bounds = timeline.bounds;
  const center = {
    x: bounds.min.x + (bounds.span.x / 2),
    y: bounds.min.y + (bounds.span.y / 2),
    z: bounds.min.z + (bounds.span.z / 2)
  };
  const scale = computeSceneScale(bounds, width, height);
  const offsetX = width * 0.5;
  const offsetY = height * 0.58;
  const visibleSegmentEnd = getVisibleSegmentEnd();
  const project = playback.viewMode === 'top'
    ? point => projectTop(point, bounds, scale, offsetX - ((bounds.span.x * scale) / 2), offsetY + ((bounds.span.y * scale) / 2))
    : point => projectPerspective(point, center, scale, offsetX, offsetY);

  renderStaticLayer(bounds, width, height, offsetX, offsetY, scale, center);

  const visibleEnd = Math.min(visibleSegmentEnd, timeline.segments.length - 1);
  const from = { x: 0, y: 0 };
  const to = { x: 0, y: 0 };
  const rapidPath = new Path2D();
  const feedPath = new Path2D();
  const activePath = new Path2D();
  let hasRapid = false;
  let hasFeed = false;
  let hasActive = false;
  const projectInto = playback.viewMode === 'top'
    ? (point, out) => projectTopInto(point, bounds, scale, offsetX - ((bounds.span.x * scale) / 2), offsetY + ((bounds.span.y * scale) / 2), out)
    : (point, out) => projectPerspectiveInto(point, center, scale, offsetX, offsetY, out);

  for (let index = 0; index <= visibleEnd; index += 1) {
    const segment = timeline.segments[index];
    projectInto(segment.from, from);
    projectInto(segment.to, to);
    const isActive = segment.commandId === playback.commandCursor;
    if (isActive) {
      activePath.moveTo(from.x, from.y);
      activePath.lineTo(to.x, to.y);
      hasActive = true;
    } else if (segment.motionType === 'rapid') {
      rapidPath.moveTo(from.x, from.y);
      rapidPath.lineTo(to.x, to.y);
      hasRapid = true;
    } else {
      feedPath.moveTo(from.x, from.y);
      feedPath.lineTo(to.x, to.y);
      hasFeed = true;
    }
  }

  if (hasRapid) {
    ctx.strokeStyle = 'rgba(96, 165, 250, 0.82)';
    ctx.lineWidth = 1.5;
    ctx.stroke(rapidPath);
  }
  if (hasFeed) {
    ctx.strokeStyle = 'rgba(20, 184, 166, 0.88)';
    ctx.lineWidth = 2.2;
    ctx.stroke(feedPath);
  }
  if (hasActive) {
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 3;
    ctx.stroke(activePath);
  }

  const activeCommand = timeline.commands[clampCommandCursor(playback.commandCursor)] || null;
  setStatusText([
    `${timeline.title}`,
    `View: ${playback.viewMode === 'top' ? 'Top' : 'Perspective'}`,
    `Commands: ${timeline.commandCount}`,
    `Segments: ${timeline.segments.length}`,
    activeCommand ? `Active: ${activeCommand.display}` : 'Active: none'
  ].join('\n'));
}

let _lastCommandListSampleCount = -1;

function updateCommandListActive(previousCommandId, nextCommandId, shouldScroll = false) {
  if (!commandItems.length) return;
  if (previousCommandId === nextCommandId) return;
  const prevItem = commandItems[previousCommandId];
  if (prevItem) prevItem.classList.remove('active');
  const nextItem = commandItems[nextCommandId];
  if (nextItem) {
    nextItem.classList.add('active');
    if (shouldScroll) requestAnimationFrame(() => nextItem.scrollIntoView({ block: 'nearest' }));
  }
  lastActiveCommandId = nextCommandId;
}

function renderCommandList() {
  if (!timeline) { commandList.innerHTML = ''; commandItems = []; lastActiveCommandId = -1; _lastCommandListSampleCount = -1; return; }

    selectedCommandIds = new Set();
    lastClickedCommandId = null;
  const benchSamples = getBenchmarkSamples();
  if ((!timeline.commands || !timeline.commands.length) && benchSamples.length) {
    // Skip full rebuild if sample count hasn't changed
    if (benchSamples.length === _lastCommandListSampleCount) return;
    _lastCommandListSampleCount = benchSamples.length;
    commandList.innerHTML = '';
    commandItems = [];
    lastActiveCommandId = -1;
    benchSamples.slice().reverse().forEach(sample => {
      const item = document.createElement('li');
      item.className = 'command-item';

      const fields = sample.fields || {};
      const sampleDistance = Number(fields.distance ?? fields.dist ?? fields.d);
      const sampleAccel = Number(fields.accel ?? fields.a);
      const fallbackLabel = [
        fields.method ? `method=${fields.method}` : '',
        Number.isFinite(Number(fields.round)) && Number(fields.round) > 0 ? `round=${Number(fields.round)}` : '',
        Number.isFinite(Number(fields.cmds ?? fields.commands)) && Number(fields.cmds ?? fields.commands) > 0 ? `cmds=${Number(fields.cmds ?? fields.commands)}` : ''
      ].filter(Boolean).join(' ');

      const head = Number.isFinite(sampleDistance) && Number.isFinite(sampleAccel)
        ? `${sampleDistance} mm @ ${sampleAccel} accel`
        : (fallbackLabel || 'Generic benchmark sample');
      item.textContent = `${head} | ${Number(sample.elapsedMs || 0).toFixed(1)} ms ${Object.keys(fields).slice(0, 4).map(key => `${key}=${fields[key]}`).join(' ')} | ${sample.startedAtIso || 'live'}`;
      commandList.appendChild(item);
    });
    return;
  }

  _lastCommandListSampleCount = -1;
  commandList.innerHTML = '';
  commandItems = [];
  lastActiveCommandId = -1;
  if (!timeline.commands.length) return;

    updateAiContextBar();
  timeline.commands.forEach(command => {
    const item = document.createElement('li');
    item.className = `command-item${command.commandId === playback.commandCursor ? ' active' : ''}`;
    item.dataset.commandId = String(command.commandId);
    const sourceLabel = command.sourceLine ? `L${command.sourceLine}` : 'GEN';
    const segmentLabel = command.firstSegment === -1
      ? 'non-motion'
      : `seg ${command.firstSegment + 1}-${command.lastSegment + 1}`;
    item.textContent = `${String(command.commandId + 1).padStart(4, '0')} | ${sourceLabel} | ${segmentLabel} | ${command.display || command.raw}`;
    item.addEventListener('click', (e) => {
      setCommandCursor(command.commandId);
      if (e.shiftKey && lastClickedCommandId != null) {
        const lo = Math.min(lastClickedCommandId, command.commandId);
        const hi = Math.max(lastClickedCommandId, command.commandId);
        for (let id = lo; id <= hi; id += 1) selectedCommandIds.add(id);
      } else if (e.ctrlKey || e.metaKey) {
        if (selectedCommandIds.has(command.commandId)) selectedCommandIds.delete(command.commandId);
        else selectedCommandIds.add(command.commandId);
      } else {
        selectedCommandIds.clear();
        selectedCommandIds.add(command.commandId);
      }
      lastClickedCommandId = command.commandId;
      refreshSelectedStyles();
      updateAiContextBar();
    });
    commandList.appendChild(item);
    commandItems[command.commandId] = item;
  });
  updateCommandListActive(-1, playback.commandCursor, true);
}

function isBenchmarkOnlyTimeline(candidate) {
  return Boolean(
    candidate &&
    candidate.benchmark &&
    !Number(candidate.commandCount || 0) &&
    (!Array.isArray(candidate.segments) || !candidate.segments.length)
  );
}

function createWaitingBenchmarkTimeline(title, previousTimeline = null) {
  const previousBenchmark = previousTimeline?.benchmark || null;
  return {
    title,
    commands: [],
    commandCount: 0,
    segments: [],
    stats: {
      motionCommandCount: 0,
      errorCount: 0
    },
    bounds: {
      min: { x: 0, y: 0, z: 0 },
      max: { x: 0, y: 0, z: 0 },
      span: { x: 0, y: 0, z: 0 }
    },
    commandToLastSegment: [],
    benchmark: previousBenchmark || {
      title,
      sampleCount: 0,
      summary: [],
      series: [],
      samples: [],
      records: [],
      activeMarkers: [],
      meta: {
        title,
        xField: 'sampleIndex',
        yField: 'elapsedMs',
        seriesField: '',
        xLabel: 'Sample',
        yLabel: 'Elapsed (ms)',
        description: 'Waiting for live BENCH samples'
      }
    }
  };
}

function loadTimeline(nextTimeline) {
  const previousTimeline = timeline;
  const previousViewMode = playback.viewMode;

  // If an update arrives without benchmark payload, retain the existing benchmark
  // data so the chart doesn't disappear at script completion due unrelated refreshes.
  if (!nextTimeline?.benchmark && previousTimeline?.benchmark) {
    nextTimeline = { ...nextTimeline, benchmark: previousTimeline.benchmark };
  }

  timeline = nextTimeline;
  titleEl.textContent = timeline.title || 'GRBL Preview';
  const benchmarkSampleCount = Number(timeline?.benchmark?.sampleCount || 0);
  const benchmarkActiveCount = Number(timeline?.benchmark?.activeMarkers?.length || 0);
  statsEl.textContent = benchmarkSampleCount
    ? `${timeline.stats.motionCommandCount} motion command(s) | ${benchmarkSampleCount} benchmark sample(s)`
    : `${timeline.stats.motionCommandCount} motion command(s) | ${timeline.stats.errorCount} error(s)`;

  const nextIsBenchmarkOnly = isBenchmarkOnlyTimeline(timeline);
  const prevIsBenchmarkOnly = isBenchmarkOnlyTimeline(previousTimeline);
  const nextHasBenchmark = Boolean(timeline?.benchmark);
  const prevHasBenchmark = Boolean(previousTimeline?.benchmark);

  if (nextIsBenchmarkOnly && (benchmarkSampleCount > 0 || benchmarkActiveCount > 0 || previousViewMode === 'benchmark')) {
    playback.viewMode = 'benchmark';
  }

  // Avoid visual flicker during live benchmark updates by not rewinding playback
  // when we are receiving successive benchmark payloads.
  if (!((prevIsBenchmarkOnly && nextIsBenchmarkOnly) || (previousViewMode === 'benchmark' && prevHasBenchmark && nextHasBenchmark))) {
    resetPlayback();
  } else {
    syncPlaybackUi();
  }
  renderCommandList();
  syncQueuePanelUi();
  render();
}

function loadWaitingState(payload = null) {
  const waitingTitle = String(payload?.title || 'GRBL Preview').trim() || 'GRBL Preview';
  const waitingMessage = String(payload?.message || 'Waiting for benchmarking data...').trim() || 'Waiting for benchmarking data...';
  const previousTimeline = timeline;

  timeline = createWaitingBenchmarkTimeline(waitingTitle, previousTimeline);
  playback.playing = false;
  playback.commandCursor = 0;
  playback.accumulatorMs = 0;
  playback.lastFrameAt = 0;
  playback.viewMode = 'benchmark';

  titleEl.textContent = waitingTitle;
  statsEl.textContent = 'Waiting for benchmark data';
  setStatusText(`${waitingTitle}\n${waitingMessage}`);
  setBenchmarkInfoText(`${waitingTitle}\nView: Benchmark\n${waitingMessage}`);
  emptyState.style.display = 'none';
  emptyState.innerHTML = '<strong>Waiting for benchmark data.</strong><br>Run a GCOM script with BENCH START / BENCH END markers.';
  commandList.innerHTML = '';
  commandItems = [];
  lastActiveCommandId = -1;
  commandProgress.textContent = '0 / 0';
  benchmarkTapePanel.classList.remove('active');
  _lastTapeSampleCount = -1;
  _lastCommandListSampleCount = -1;

  applyViewModeUi();
  syncPlaybackUi();
  syncQueuePanelUi();
  render();
}

function stripCommandComments(text) {
  return String(text || '')
    .replace(/\([^)]*\)/g, ' ')
    .replace(/;.*$/g, ' ')
    .trim();
}

function collectQueueLines(includeNonMotion) {
  if (!timeline || !timeline.commands || !timeline.commands.length) return [];
  const lines = [];
  timeline.commands.forEach(command => {
    if (!includeNonMotion && command.firstSegment === -1) return;
    const raw = String(command.raw || command.display || '').trim();
    if (!raw.length) return;
    if (!stripCommandComments(raw).length) return;
    lines.push(raw);
  });
  return lines;
}

// ==== AI Context Selection ====

function refreshSelectedStyles() {
  commandItems.forEach((item, id) => {
    if (!item) return;
    if (selectedCommandIds.has(id)) item.classList.add('selected');
    else item.classList.remove('selected');
  });
}

function updateAiContextBar() {
  const count = selectedCommandIds.size;
  aiContextCount.textContent = count === 0 ? '0 selected' : `${count} command${count === 1 ? '' : 's'} selected`;
  const openerReady = Boolean(window.opener && !window.opener.closed);
  sendToAiBtn.disabled = count === 0 || !openerReady;
}

function buildAiSelectionPayload() {
  if (!timeline || !timeline.commands) return null;
  const sourceLines = String(timeline.scriptSource || '').split('\n');
  const gcomLineToPhysicalIndex = new Map();
  sourceLines.forEach((text, index) => {
    const match = String(text || '').match(/^\s*(\d+)\s+/);
    if (!match) return;
    const gcomLine = parseInt(match[1], 10);
    if (Number.isFinite(gcomLine)) gcomLineToPhysicalIndex.set(gcomLine, index);
  });

  const selectedCmds = [];
  const selectedSegments = [];
  const usedSourceLineNums = new Set();
  const selectedCommandIdSet = new Set();
  const commandTape = timeline.commands.map(cmd => ({
    commandId: cmd.commandId,
    sourceLine: cmd.sourceLine,
    raw: cmd.raw,
    display: cmd.display,
    firstSegment: cmd.firstSegment,
    lastSegment: cmd.lastSegment
  }));

  for (const id of [...selectedCommandIds].sort((a, b) => a - b)) {
    const cmd = timeline.commands[id];
    if (!cmd) continue;
    selectedCommandIdSet.add(cmd.commandId);
    selectedCmds.push({
      commandId: cmd.commandId,
      sourceLine: cmd.sourceLine,
      raw: cmd.raw,
      display: cmd.display,
      firstSegment: cmd.firstSegment,
      lastSegment: cmd.lastSegment
    });
    if (cmd.sourceLine != null) usedSourceLineNums.add(cmd.sourceLine);
    if (cmd.firstSegment >= 0) {
      for (let si = cmd.firstSegment; si <= cmd.lastSegment; si += 1) {
        const seg = timeline.segments[si];
        if (seg) selectedSegments.push({
          commandId: seg.commandId,
          sourceLine: seg.sourceLine,
          raw: seg.raw,
          motionType: seg.motionType,
          feedRate: seg.feedRate ?? null,
          from: { x: seg.from.x, y: seg.from.y, z: seg.from.z ?? 0 },
          to:   { x: seg.to.x,   y: seg.to.y,   z: seg.to.z   ?? 0 }
        });
      }
    }
  }

  // Collect the GCOM source line text for each referenced line (plus 1 line of context either side)
  const contextLines = [];
  const addedLineNums = new Set();
  for (const lineNum of [...usedSourceLineNums].sort((a, b) => a - b)) {
    const physicalIndex = gcomLineToPhysicalIndex.has(lineNum)
      ? gcomLineToPhysicalIndex.get(lineNum)
      : (lineNum >= 1 && lineNum <= sourceLines.length ? lineNum - 1 : -1);
    if (physicalIndex < 0) continue;
    for (let idx = Math.max(0, physicalIndex - 1); idx <= Math.min(sourceLines.length - 1, physicalIndex + 1); idx += 1) {
      const physicalLineNumber = idx + 1;
      if (addedLineNums.has(physicalLineNumber)) continue;
      addedLineNums.add(physicalLineNumber);
      const text = sourceLines[idx] ?? '';
      if (!text.trim()) continue;
      const match = String(text).match(/^\s*(\d+)\s+/);
      contextLines.push({
        physicalLineNumber,
        lineNumber: match ? parseInt(match[1], 10) : physicalLineNumber,
        text
      });
    }
  }

  // Geometric summary over selected segments
  let totalDistance = 0;
  const feedRates = [];
  const motionTypesSet = new Set();
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  let minZ = Infinity, maxZ = -Infinity;
  for (const seg of selectedSegments) {
    const dx = seg.to.x - seg.from.x;
    const dy = seg.to.y - seg.from.y;
    const dz = seg.to.z - seg.from.z;
    totalDistance += Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (seg.feedRate != null) feedRates.push(seg.feedRate);
    motionTypesSet.add(seg.motionType);
    for (const pt of [seg.from, seg.to]) {
      if (pt.x < minX) minX = pt.x; if (pt.x > maxX) maxX = pt.x;
      if (pt.y < minY) minY = pt.y; if (pt.y > maxY) maxY = pt.y;
      if (pt.z < minZ) minZ = pt.z; if (pt.z > maxZ) maxZ = pt.z;
    }
  }

  const allSourceLineNums = selectedCmds.map(c => c.sourceLine).filter(n => n != null);

  return {
    selectionSummary: {
      selectedCommandCount: selectedCmds.length,
      selectedSegmentCount: selectedSegments.length,
      selectedCommandIds: [...selectedCommandIdSet].sort((a, b) => a - b),
      note: 'User selected these commands or segments for special attention. Interpret them within the context of the full command tape and whole script.'
    },
    commands: selectedCmds,
    segments: selectedSegments,
    commandTape,
    // Nearby GCOM source lines for each selected command — gives the AI the genesis of these moves
    sourceContext: contextLines,
    // Full script source (first 150 lines max) so the AI can see the overall program structure
    scriptSource: sourceLines.slice(0, 150).join('\n'),
    scriptTitle: timeline.title || 'Untitled',
    geometric: {
      totalDistanceMm: Math.round(totalDistance * 1000) / 1000,
      avgFeedRate: feedRates.length
        ? Math.round(feedRates.reduce((a, b) => a + b, 0) / feedRates.length)
        : null,
      motionTypes: [...motionTypesSet],
      minSourceLine: allSourceLineNums.length ? Math.min(...allSourceLineNums) : null,
      maxSourceLine: allSourceLineNums.length ? Math.max(...allSourceLineNums) : null,
      bounds: selectedSegments.length ? {
        min: { x: minX, y: minY, z: minZ },
        max: { x: maxX, y: maxY, z: maxZ }
      } : null
    },
    totalCommandsInScript: timeline.commandCount,
    totalSegmentsInScript: timeline.segments.length,
    scriptStats: timeline.stats
  };
}

sendToAiBtn.addEventListener('click', () => {
  if (!window.opener || window.opener.closed) { updateAiContextBar(); return; }
  const payload = buildAiSelectionPayload();
  if (!payload) return;
  window.opener.postMessage({ type: 'preview-selection', payload }, window.location.origin);
  sendToAiBtn.textContent = 'Sent ✓';
  sendToAiBtn.disabled = true;
  setTimeout(() => { sendToAiBtn.textContent = 'Send to AI'; updateAiContextBar(); }, 1800);
});

function syncQueuePanelUi() {
  const hasTimeline = Boolean(timeline && timeline.commands && timeline.commands.length);
  const openerReady = Boolean(window.opener && !window.opener.closed);
  queueFromPreviewBtn.disabled = !hasTimeline || !openerReady;
  if (!hasTimeline) {
    queueStatus.textContent = 'Load a preview to enable queue export.';
    return;
  }
  if (!openerReady) {
    queueStatus.textContent = 'Queue unavailable: open preview from the main app.';
    return;
  }
  queueStatus.textContent = 'Queue target ready.';
}

function requestQueueFromPreview() {
  if (!timeline) return;
  if (!window.opener || window.opener.closed) {
    queueStatus.textContent = 'Queue unavailable: opener window not available.';
    syncQueuePanelUi();
    return;
  }
  const includeNonMotion = Boolean(queueIncludeNonMotion.checked);
  const lines = collectQueueLines(includeNonMotion);
  if (!lines.length) {
    queueStatus.textContent = includeNonMotion
      ? 'No commands available to queue.'
      : 'No motion commands found with current filter.';
    return;
  }
  const mode = queueModeSelect.value === 'fast-buffer' ? 'fast-buffer' : 'sync-ack';
  const payload = {
    type: 'preview-queue-gcode',
    payload: {
      mode,
      includeNonMotion,
      sourceTitle: timeline.title || 'Preview Job',
      raw: lines.join('\n')
    }
  };
  try {
    window.opener.postMessage(payload, window.location.origin);
    queueStatus.textContent = `Queued ${lines.length} command(s) to main window.`;
  } catch {
    queueStatus.textContent = 'Queue request failed to post to main window.';
  }
}

function tick(timestamp) {
  if (playback.playing && timeline && timeline.commandCount > 0) {
    if (!playback.lastFrameAt) playback.lastFrameAt = timestamp;
    playback.accumulatorMs += (timestamp - playback.lastFrameAt);
    playback.lastFrameAt = timestamp;
    const nextStepMs = playback.baseCommandMs / Math.max(0.25, playback.speed);
    let advanced = false;
    const previousCursor = playback.commandCursor;
    while (playback.accumulatorMs >= nextStepMs) {
      playback.accumulatorMs -= nextStepMs;
      if (playback.commandCursor >= timeline.commandCount - 1) {
        playback.playing = false;
        playback.accumulatorMs = 0;
        break;
      }
      playback.commandCursor += 1;
      advanced = true;
    }
    if (advanced) {
      syncPlaybackUi();
      updateCommandListActive(previousCursor, playback.commandCursor, true);
      render();
    }
  } else {
    playback.lastFrameAt = timestamp;
  }
  requestAnimationFrame(tick);
}

playBtn.addEventListener('click', () => {
  if (!timeline || !timeline.commandCount) return;
  if (!playback.playing && playback.commandCursor >= timeline.commandCount - 1) {
    setCommandCursor(0);
  }
  playback.playing = !playback.playing;
  syncPlaybackUi();
});
rewindBtn.addEventListener('click', () => {
  playback.playing = false;
  setCommandCursor(0);
});
stepBackBtn.addEventListener('click', () => {
  playback.playing = false;
  stepCommands(-1);
});
stepForwardBtn.addEventListener('click', () => {
  playback.playing = false;
  stepCommands(1);
});
endBtn.addEventListener('click', jumpToEnd);
fitBtn.addEventListener('click', fitPreview);
tapeCopyBtn.addEventListener('click', copyBenchmarkDataToClipboard);
viewSelect.addEventListener('change', () => {
  playback.viewMode = viewSelect.value;
  applyViewModeUi();
  render();
});
speedSelect.addEventListener('change', () => {
  playback.speed = Number(speedSelect.value) || 1;
  syncPlaybackUi();
});
canvas.addEventListener('wheel', applyWheelZoom, { passive: false });
queueFromPreviewBtn.addEventListener('click', requestQueueFromPreview);

let _pendingTimelinePayload = null;
let _timelineRafPending = false;

window.addEventListener('message', event => {
  if (event.origin !== window.location.origin) return;
  if (!event.data || typeof event.data !== 'object') return;
  if (event.data.type === 'preview-waiting') {
    loadWaitingState(event.data.payload || null);
    _pendingTimelinePayload = null;
    return;
  }
  if (event.data.type !== 'preview-load') return;
  // Coalesce rapid postMessage calls — only render the latest one per animation frame
  _pendingTimelinePayload = event.data.payload;
  if (!_timelineRafPending) {
    _timelineRafPending = true;
    requestAnimationFrame(() => {
      _timelineRafPending = false;
      if (_pendingTimelinePayload) {
        loadTimeline(_pendingTimelinePayload);
        _pendingTimelinePayload = null;
      }
    });
  }
});

window.addEventListener('resize', resizeCanvas);
window.addEventListener('beforeunload', () => {
  if (window.opener && !window.opener.closed) {
    try { window.opener.postMessage({ type: 'preview-closed' }, window.location.origin); } catch {}
  }
});

resizeCanvas();
syncPlaybackUi();
syncQueuePanelUi();
requestAnimationFrame(tick);

if (window.opener && !window.opener.closed) {
  try {
    window.opener.postMessage({ type: 'preview-ready' }, window.location.origin);
  } catch {}
}
</script>
</body>
